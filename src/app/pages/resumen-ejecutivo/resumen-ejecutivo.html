@if (d(); as d) {
  <h1>Resumen Ejecutivo</h1>
  <p class="subtitle">Panel de control general del ecosistema de sucursales</p>

  <div class="kpi-row">
    <app-kpi-card label="Total Sucursales" [value]="d.totalSucursales" [sub]="d.activas + ' activas · ' + d.inactivas + ' inactivas · ' + d.pendientes + ' pendientes'" color="blue" />
    <app-kpi-card label="% Sucursales Activas" [value]="d.pctActivas + '%'" [sub]="d.activas + ' de ' + d.totalSucursales + ' sucursales'" color="green" />
    <app-kpi-card label="% Cobertura Distribuidor" [value]="d.pctCobDist + '%'" [sub]="d.sucConDist + ' sucursales con distribuidor'" color="teal" />
    <app-kpi-card label="% Cobertura Social" [value]="d.pctCobSocial + '%'" [sub]="d.sucConSocial + ' sucursales con red social'" color="purple" />
    <app-kpi-card label="Score Riesgo Operativo" [value]="d.scoreRiesgo" sub="0.40×MailFail + 0.40×CompOpen + 0.20×SoftDel" color="orange" />
  </div>

  <div class="chart-row">
    <mat-card class="chart-card">
      <mat-card-header><mat-card-title>Sucursales por Provincia</mat-card-title></mat-card-header>
      <mat-card-content><canvas baseChart [data]="barData()" [type]="barChartType" [options]="barOptions"></canvas></mat-card-content>
    </mat-card>
    <mat-card class="chart-card">
      <mat-card-header><mat-card-title>Estado de Sucursales</mat-card-title></mat-card-header>
      <mat-card-content><canvas baseChart [data]="estadoData()" [type]="doughnutType" [options]="doughnutOptions"></canvas></mat-card-content>
    </mat-card>
  </div>

  <div class="chart-row">
    <mat-card class="chart-card full">
      <mat-card-header><mat-card-title>Compensaciones por Mes</mat-card-title></mat-card-header>
      <mat-card-content><canvas baseChart [data]="compMesData()" [type]="lineChartType" [options]="lineOptions"></canvas></mat-card-content>
    </mat-card>
  </div>
}
