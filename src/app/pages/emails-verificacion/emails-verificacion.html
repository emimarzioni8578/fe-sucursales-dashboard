@if (data$ | async; as d) {
  <h1>Emails y Verificación</h1>
  <p class="subtitle">Monitor de envío de correos, tasa de fallos y reintentos SMTP</p>
  <div class="kpi-row">
    <app-kpi-card label="Mails Totales" [value]="d.totalMails" [trend]="d.trends.mailsTotal" color="blue" />
    <app-kpi-card label="Mails Enviados" [value]="d.mailsEnviados" color="green" />
    <app-kpi-card label="Mails Fallidos" [value]="d.mailsFallidos" [sub]="d.pctMailsFallidos + '% del total'" [trend]="d.trends.mailsFallidos" [trendInverse]="true" color="red" />
    <app-kpi-card label="Reintentos SMTP" [value]="d.reintentosSMTP" color="orange" />
  </div>
  <div class="chart-row">
    <mat-card class="chart-card"><mat-card-header><mat-card-title>Mails por Estado</mat-card-title></mat-card-header><mat-card-content><canvas baseChart [data]="getMailsEstado(d)" [type]="doughnutType" [options]="doughnutOptions"></canvas></mat-card-content></mat-card>
    <mat-card class="chart-card"><mat-card-header><mat-card-title>Fallos por Asunto</mat-card-title></mat-card-header><mat-card-content><canvas baseChart [data]="getMailsAsunto(d)" [type]="barType" [options]="horizBarOptions"></canvas></mat-card-content></mat-card>
  </div>
  <div class="chart-row">
    <mat-card class="chart-card full"><mat-card-header><mat-card-title>Distribución de Fallos por Provincia</mat-card-title></mat-card-header><mat-card-content><canvas baseChart [data]="getMailsProvincia(d)" [type]="barType" [options]="barOptions"></canvas></mat-card-content></mat-card>
  </div>
}
